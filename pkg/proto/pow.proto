syntax = "proto3";
package pb;
import "common.proto";

option go_package="github.com/zzz136454872/upgradeable-consensus/pkg/proto";


message PoWBlock {
  bytes parentHash = 1;
  uint64 height=2;
  repeated bytes txs=3;
  uint64 nonce=4;
  bytes blockHash = 5;
  bool commited = 6;
  bytes shardingName = 7;
  bytes incentive = 8;
}

message PoWMessage {
  oneof msg {
    PoWBlock block = 1;
    Request request = 2;
  }
}
