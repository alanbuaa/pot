syntax = "proto3";
package pb;
//import "pb/pot.proto";
import "pb/common.proto";

option go_package = "./pb";

enum PacketType {
  P2PPACKET = 0;
  CLIENTPACKET = 1;
}


message Packet {
  bytes msg = 1;
  int64 consensusID = 2;
  int64 epoch = 3;
  int32 chainID = 4;
  PacketType type = 5;
  string receiverPublicAddress = 6;
  string receiverShardingName = 7;
}

enum TransactionType{
  NORMAL = 0;
  UPGRADE = 1;
  TIMEVOTE = 2;
  LOCK = 3;
  CENSORSHIP_RESISTANT = 4;
}

enum TransactionClass {
  TRANSACTION_CLASS_NORMAL = 0;
  TRANSACTION_CLASS_GOVERNANCE = 1;
  TRANSACTION_CLASS_CONSENSUS = 2;
}


message Transaction {
  TransactionType type = 1;

  bytes payload = 2;
  int32 chainID = 3;
  TransactionClass txClass = 4;
}

service P2P {
  rpc Send(Packet) returns (Empty) {}
}

